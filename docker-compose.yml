services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports: ["2181:2181"]
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092", "9093:9093"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sirp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sirp}
      POSTGRES_DB: ${POSTGRES_DB:-sirp}
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports: ["9200:9200"]
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports: ["8080:8080"]
  vault:
    image: hashicorp/vault:1.17
    cap_add: ["IPC_LOCK"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ["8200:8200"]
  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports: ["16686:16686", "14268:14268"]
  prometheus:
    image: prom/prometheus:v2.54.1
    ports: ["9090:9090"]
  grafana:
    image: grafana/grafana:11.1.4
    ports: ["3001:3000"]
  api-gateway:
    build: ./services/api-gateway
    restart: unless-stopped
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [alert-service, case-service, observable-service, analyzer-service, notification-service, secret-service]
  alert-service:
    build: ./services/alert-service
    restart: unless-stopped
    env_file: .env
    depends_on: [postgres, redis, kafka, elasticsearch, secret-service]
  case-service:
    build: ./services/case-service
    restart: unless-stopped
    env_file: .env
    depends_on: [postgres, kafka]
  observable-service:
    build: ./services/observable-service
    restart: unless-stopped
    env_file: .env
    depends_on: [postgres, redis, kafka, elasticsearch]
  analyzer-service:
    build: ./services/analyzer-service
    restart: unless-stopped
    env_file: .env
    depends_on: [postgres, redis, kafka, secret-service]
  secret-service:
    build: ./services/secret-service
    env_file: .env
    depends_on: [postgres]
  automation-service:
    build: ./services/automation-service
    restart: unless-stopped
    env_file: .env
    depends_on: [redis, kafka]
  notification-service:
    build: ./services/notification-service
    restart: unless-stopped
    env_file: .env
    depends_on: [kafka]
  frontend:
    build: ./services/frontend
    restart: unless-stopped
    env_file: .env
    ports: ["3000:3000"]
    depends_on: [api-gateway]
volumes:
  pg_data:
